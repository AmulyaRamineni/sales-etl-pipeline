version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: sales_postgres
    environment:
      POSTGRES_DB: sales_db
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
